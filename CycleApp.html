// ── Date utils ────────────────────────────────────────────────────────────────
const toStr  = d => d.toISOString().split('T')[0];
const parse  = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const diff   = (a,b) => Math.round((b-a)/86400000);
const add    = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const today  = () => new Date();
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const WDAYS  = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

function fmtDate(s) {
  if (!s) return '';
  const d = parse(s);
  return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

// ── Cycle logic ───────────────────────────────────────────────────────────────
function getPhaseInfo(dateStr, cycles, defLen) {
  if (!cycles.length) return null;
  const d = parse(dateStr);
  for (const c of [...cycles].reverse()) {
    const start = parse(c.startDate);
    const cl = c.cycleLength || defLen;
    const pl = c.periodLength || 5;
    if (d >= start && d < add(start, cl)) {
      const day = diff(start, d) + 1;
      const ovDay = cl - 14;
      let phase;
      if (day <= pl)                         phase = PHASES.MENSTRUAL;
      else if (day >= ovDay && day <= ovDay+2) phase = PHASES.OVULATION;
      else if (day < ovDay)                  phase = PHASES.FOLLICULAR;
      else                                   phase = PHASES.LUTEAL;
      return { phase, day, cycleLength: cl };
    }
  }
  return null;
}

function predictions(cycles, defLen, n=3) {
  if (!cycles.length) return [];
  const avg = cycles.length > 1
    ? Math.round(cycles.reduce((s,c) => s+(c.cycleLength||defLen),0)/cycles.length)
    : defLen;
  const last = parse(cycles[cycles.length-1].startDate);
  return Array.from({length:n},(_,i)=>({ start: add(last, avg*(i+1)), len: avg }));
}

function predPhaseForDate(dateStr, preds, defPl=5) {
  const d = parse(dateStr);
  for (const p of preds) {
    if (d >= p.start && d < add(p.start, p.len)) {
      const day = diff(p.start, d)+1;
      const ov = p.len-14;
      let phase;
      if (day <= defPl)               phase = PHASES.MENSTRUAL;
      else if (day>=ov && day<=ov+2)  phase = PHASES.OVULATION;
      else if (day < ov)              phase = PHASES.FOLLICULAR;
      else                            phase = PHASES.LUTEAL;
      return { phase, predicted: true };
    }
  }
  return null;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView]       = useState('home');
  const [cycles, setCycles]   = useState(() => LS.get('cycles', INIT_CYCLES));
  const [notes, setNotes]     = useState(() => LS.get('notes', {}));
  const [profile, setProfile] = useState(() => LS.get('profile', INIT_PROFILE));
  const [modal, setModal]     = useState(null);

  useEffect(() => LS.set('cycles', cycles),   [cycles]);
  useEffect(() => LS.set('notes', notes),     [notes]);
  useEffect(() => LS.set('profile', profile), [profile]);

  const todayStr = toStr(today());
  const phaseInfo = getPhaseInfo(todayStr, cycles, profile.defaultCycleLength);
  const preds = predictions([...cycles].sort((a,b)=>a.startDate.localeCompare(b.startDate)), profile.defaultCycleLength);
  const daysUntil = preds.length ? Math.max(0, diff(today(), preds[0].start)) : null;

  const upsertCycle = c => setCycles(p => {
    const idx = p.findIndex(x=>x.id===c.id);
    const next = idx>=0 ? p.map((x,i)=>i===idx?c:x) : [...p, c];
    return next.sort((a,b)=>a.startDate.localeCompare(b.startDate));
  });
  const saveNote = (d,n) => setNotes(p=>({...p,[d]:n}));
  const close = () => setModal(null);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}>
      <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        {view==='home'     && <HomeView phaseInfo={phaseInfo} daysUntil={daysUntil} preds={preds} todayStr={todayStr} notes={notes} onNote={d=>setModal({t:'note',d:{date:d||todayStr}})} onRec={pk=>setModal({t:'rec',d:{phase:pk}})} />}
        {view==='calendar' && <CalView cycles={cycles} notes={notes} profile={profile} preds={preds} onDay={d=>setModal({t:'day',d:{date:d}})} />}
        {view==='notes'    && <NotesView notes={notes} cycles={cycles} profile={profile} onEdit={d=>setModal({t:'note',d:{date:d}})} todayStr={todayStr} />}
        {view==='profile'  && <ProfileView profile={profile} cycles={[...cycles].sort((a,b)=>b.startDate.localeCompare(a.startDate))} onProfile={setProfile} onAddCycle={()=>setModal({t:'cycle',d:{}})} onEditCycle={c=>setModal({t:'cycle',d:c})} onDelCycle={id=>setCycles(p=>p.filter(c=>c.id!==id))} />}
      </div>
      <nav className="nav">
        {[
          {k:'home',    iA:Icon.homeA,    i:Icon.home,    lbl:'Accueil'},
          {k:'calendar',iA:Icon.calA,     i:Icon.cal,     lbl:'Calendrier'},
          {k:'notes',   iA:Icon.noteA,    i:Icon.note,    lbl:'Notes'},
          {k:'profile', iA:Icon.profileA, i:Icon.profile, lbl:'Profil'},
        ].map(({k,i,iA,lbl})=>(
          <button key={k} className={`nav-tab${view===k?' active':''}`} onClick={()=>setView(k)}>
            {view===k ? iA : i}
            <span>{lbl}</span>
          </button>
        ))}
      </nav>

      {modal?.t==='note'  && <NoteModal  date={modal.d.date} existing={notes[modal.d.date]} onSave={saveNote} onClose={close} />}
      {modal?.t==='day'   && <DayModal   date={modal.d.date} cycles={cycles} profile={profile} notes={notes} onClose={close} onNote={d=>{close();setModal({t:'note',d:{date:d}});}} />}
      {modal?.t==='rec'   && <RecModal   phase={modal.d.phase} onClose={close} />}
      {modal?.t==='cycle' && <CycleModal cycle={modal.d.id?modal.d:null} profile={profile} onSave={c=>{upsertCycle(c);close();}} onClose={close} />}
    </div>
  );
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function CalView({ cycles, notes, profile, preds, onDay }) {
  const now = today();
  const [ym, setYm] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const { y, m } = ym;
  const todayStr = toStr(now);
  const first = new Date(y,m,1);
  const dInM  = new Date(y,m+1,0).getDate();
  const startDow = (first.getDay()+6)%7;

  const prev = () => setYm(v => v.m===0?{y:v.y-1,m:11}:{y:v.y,m:v.m-1});
  const next = () => setYm(v => v.m===11?{y:v.y+1,m:0}:{y:v.y,m:v.m+1});

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=dInM;d++){
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const pi = getPhaseInfo(ds, cycles, profile.defaultCycleLength);
    const pp = !pi ? predPhaseForDate(ds, preds, profile.defaultPeriodLength) : null;
    cells.push({ d, ds, pi, pp, hasNote:!!notes[ds], isToday: ds===todayStr });
  }

  return (
    <div className="fade-in" style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Month nav */}
      <div style={{ padding:'20px 20px 12px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <button onClick={prev} style={{ background:'#f9f0f3', border:'none', borderRadius:12, width:36, height:36, cursor:'pointer', fontSize:18, display:'flex', alignItems:'center', justifyContent:'center' }}>‹</button>
        <h2 style={{ fontWeight:800, fontSize:18 }}>{MONTHS[m]} {y}</h2>
        <button onClick={next} style={{ background:'#f9f0f3', border:'none', borderRadius:12, width:36, height:36, cursor:'pointer', fontSize:18, display:'flex', alignItems:'center', justifyContent:'center' }}>›</button>
      </div>

      {/* Legend */}
      <div style={{ padding:'0 20px 10px', display:'flex', gap:10, flexWrap:'wrap' }}>
        {Object.values(PHASES).map(p=>(
          <div key={p.key} style={{ display:'flex', alignItems:'center', gap:4 }}>
            <div style={{ width:10, height:10, borderRadius:3, background:p.soft, border:`1.5px solid ${p.color}66` }} />
            <span style={{ fontSize:10, fontWeight:700, color:'#aaa', letterSpacing:'0.3px' }}>{p.label}</span>
          </div>
        ))}
      </div>

      {/* Day headers */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', padding:'0 12px' }}>
        {WDAYS.map(d=><div key={d} style={{ textAlign:'center', fontSize:10, fontWeight:800, letterSpacing:'0.5px', color:'#c0a8b2', padding:'4px 0', textTransform:'uppercase' }}>{d}</div>)}
      </div>

      {/* Grid */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', padding:'4px 12px 16px', gap:4, flex:1, overflowY:'auto' }}>
        {cells.map((cell,i)=>{
          if(!cell) return <div key={`e${i}`} />;
          const info = cell.pi || cell.pp;
          const ph = info?.phase;
          const isPred = !!cell.pp && !cell.pi;
          return (
            <button key={cell.ds} onClick={()=>onDay(cell.ds)}
              style={{
                border: cell.isToday ? `2px solid #C2185B` : `1px solid ${ph ? ph.color+'33':'#f5e6ec'}`,
                borderRadius:12, padding:'6px 2px', cursor:'pointer',
                display:'flex', flexDirection:'column', alignItems:'center', gap:2,
                background: ph ? (isPred ? ph.soft+'99' : ph.soft) : '#fff',
                opacity: isPred ? 0.65 : 1, minHeight:44,
              }}>
              <span style={{ fontSize:13, fontWeight: cell.isToday?800:400, color: cell.isToday?'#C2185B':'#1a1a1a' }}>{cell.d}</span>
              {ph && <div style={{ width:5, height:5, borderRadius:'50%', background: isPred?ph.color+'88':ph.color }} />}
              {cell.hasNote && <div style={{ width:3, height:3, borderRadius:'50%', background:'#C2185B' }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── Notes ─────────────────────────────────────────────────────────────────────

        <div style={{ background:'#fdf0f4', borderRadius:24, padding:40, textAlign:'center' }}>

              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6 }}>

              <p style={{ fontSize:11, color:'#aaa', marginTop:2, fontWeight:600, letterSpacing:'0.3px' }}>{c.periodLength}j de règles · Cycle {c.cycleLength}j</p>

              <button onClick={()=>onEditCycle(c)} style={{ background:'#fdf0f4', border:'none', borderRadius:10, width:32, height:32, cursor:'pointer', fontSize:14 }}>✏️</button>

      <div style={{ height:16 }} />

// ── Modals ────────────────────────────────────────────────────────────────────
function Sheet({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-head">
          <h3 style={{ fontWeight:800, fontSize:17 }}>{title}</h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

function NoteModal({ date, existing, onSave, onClose }) {

  const save = () => { onSave(date, form); onClose(); };
  return (
    <Sheet title={`📓 ${fmtDate(date)}`} onClose={onClose}>
      <div style={{ padding:'20px 24px 32px', display:'flex', flexDirection:'column', gap:20 }}>
        <div>
          <p className="lbl">Humeur</p>
          <div style={{ display:'flex', gap:8, marginTop:8 }}>
            {MOOD_E.map((e,i)=>(
              <button key={i} onClick={()=>setForm(f=>({...f,mood:i+1}))}
                style={{ fontSize:30, background:'none', border:`2px solid ${form.mood===i+1?'#C2185B':'transparent'}`, borderRadius:14, padding:'4px 6px', cursor:'pointer', transition:'border-color 0.15s' }}>{e}</button>
            ))}
          </div>
        </div>
        <div>
          <p className="lbl">Niveau d'énergie</p>
          <div style={{ display:'flex', gap:8, marginTop:8 }}>
            {ENERGY_E.map((e,i)=>(
              <button key={i} onClick={()=>setForm(f=>({...f,energy:i+1}))}
                style={{ flex:1, fontSize:24, background: form.energy===i+1?'#FCE4EC':'#fdf8fa', border:`1.5px solid ${form.energy===i+1?'#C2185B':'#f0d8e0'}`, borderRadius:12, padding:'8px 0', cursor:'pointer', transition:'all 0.15s' }}>{e}</button>
            ))}
          </div>
        </div>
        <div>
          <p className="lbl">Notes libres</p>
          <textarea value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}

        <button className="btn-main" onClick={save}>Enregistrer</button>
      </div>
    </Sheet>

  const ph = pi?.phase;
  const note = notes[date];
  return (
    <Sheet title={fmtDate(date)} onClose={onClose}>
      <div style={{ padding:'20px 24px 32px', display:'flex', flexDirection:'column', gap:16 }}>
        {ph ? (
          <>
            <div style={{ background:ph.soft, borderRadius:18, padding:'14px 18px' }}>
              <span className="phase-tag" style={{ background:ph.color+'22', color:ph.color, marginBottom:8 }}>{ph.emoji} {ph.label}</span>
              <p style={{ fontSize:14, color:'#555', marginTop:6 }}>Jour {pi.day} du cycle</p>
            </div>
            {Object.entries(RECS[ph.key]).map(([k,rec])=>(
              <div key={k} style={{ background:'#fff', border:`1px solid ${ph.color}22`, borderRadius:16, padding:'14px 16px' }}>
                <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
                  <span style={{ fontSize:18 }}>{rec.icon}</span>
                  <p style={{ fontSize:11, fontWeight:800, letterSpacing:'0.8px', textTransform:'uppercase', color:ph.color }}>
                    {k==='alimentation'?'Alimentation':k==='sport'?'Sport':k==='humeur'?'Bien-être':'Productivité'}
                  </p>
                </div>
                <p style={{ fontSize:13, color:'#555', lineHeight:1.6 }}>{rec.summary}</p>
              </div>
            ))}
          </>
        ) : <p style={{ color:'#aaa' }}>Aucune phase connue pour cette date.</p>}
        {note?.text && (
          <div style={{ background:'#fdf8fa', borderRadius:14, padding:14, border:'1px solid #f0d8e0' }}>
            <p style={{ fontSize:11, fontWeight:800, color:'#c0a8b2', letterSpacing:'1px', textTransform:'uppercase', marginBottom:6 }}>Ta note</p>
            <p style={{ fontSize:13, color:'#555', lineHeight:1.6 }}>{note.text}</p>
          </div>
        )}
        <button className="btn-ghost" onClick={()=>onNote(date)}>📓 {note?'Modifier la note':'Ajouter une note'}</button>
      </div>
    </Sheet>
  );
}

function RecModal({ phase, onClose }) {
  const ph = PHASES[phase];
  const recs = RECS[phase];
  const [open, setOpen] = useState(null);
  return (
    <Sheet title={`${ph.emoji} Phase ${ph.label}`} onClose={onClose}>
      <div style={{ padding:'20px 24px 32px', display:'flex', flexDirection:'column', gap:12 }}>
        {/* Phase description strip */}
        <div style={{ background:ph.soft, borderRadius:16, padding:'12px 16px', marginBottom:4 }}>
          <p style={{ fontSize:13, color:ph.color, fontWeight:600, lineHeight:1.6 }}>
            {phase==='MENSTRUAL'  && 'Ton corps saigne et se régénère. C\'est une phase de repos biologique nécessaire — honore-la.'}
            {phase==='FOLLICULAR' && 'L\'estrogène monte, ton énergie aussi. Le renouveau est là — profite de cette vitalité croissante.'}
            {phase==='OVULATION'  && 'Tu es à ton pic de force et de charisme. Ton cerveau et ton corps sont optimisés pour performer.'}
            {phase==='LUTEAL'     && 'La progestérone ralentit le rythme. C\'est une invitation à finir, organiser et rentrer en toi-même.'}
          </p>
        </div>

        {Object.entries(recs).map(([k, rec]) => {
          const isOpen = open === k;
          const label = k==='alimentation'?'Alimentation':k==='sport'?'Sport':k==='humeur'?'Bien-être':'Productivité';
          return (
            <div key={k} style={{ background:'#fff', border:`1.5px solid ${isOpen?ph.color:ph.color+'33'}`, borderRadius:18, overflow:'hidden', transition:'border-color 0.2s' }}>
              <button onClick={()=>setOpen(isOpen?null:k)}
                style={{ width:'100%', background:'none', border:'none', padding:'16px 18px', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center', textAlign:'left' }}>
                <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                  <span style={{ fontSize:22 }}>{rec.icon}</span>
                  <div>
                    <p style={{ fontSize:10, fontWeight:800, letterSpacing:'0.8px', textTransform:'uppercase', color:ph.color }}>{label}</p>
                    <p style={{ fontSize:14, fontWeight:700, color:'#1a1a1a', marginTop:1 }}>{rec.title}</p>
                  </div>
                </div>
                <span style={{ color:ph.color, fontSize:18, fontWeight:700, transform: isOpen?'rotate(90deg)':'rotate(0)', transition:'transform 0.2s' }}>›</span>
              </button>

              {isOpen && (
                <div style={{ padding:'0 18px 18px', borderTop:`1px solid ${ph.color}22` }}>
                  {/* Résumé */}
                  <p style={{ fontSize:13, color:'#444', fontWeight:500, lineHeight:1.7, marginTop:12, marginBottom:12 }}>{rec.summary}</p>

                  {/* Science */}
                  <div style={{ background:ph.soft, borderRadius:14, padding:'12px 14px', marginBottom:12 }}>
                    <span className="science-badge" style={{ marginBottom:8 }}>Pourquoi ?</span>
                    <p style={{ fontSize:12, color:'#444', lineHeight:1.8, marginTop:8 }}>{rec.science}</p>
                  </div>

                  {/* Key points */}
                  <div>
                    <p style={{ fontSize:10, fontWeight:800, letterSpacing:'1px', textTransform:'uppercase', color:'#c0a8b2', marginBottom:8 }}>Points clés</p>
                    {rec.keys.map((kp,i)=>(
                      <div key={i} style={{ display:'flex', gap:8, alignItems:'flex-start', marginBottom:6 }}>
                        <div style={{ width:6, height:6, borderRadius:'50%', background:ph.color, flexShrink:0, marginTop:5 }} />
                        <p style={{ fontSize:13, color:'#555', lineHeight:1.5 }}>{kp}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </Sheet>
  );
}

function CycleModal({ cycle, profile, onSave, onClose }) {
  const [form, setForm] = useState(cycle || { id:Date.now().toString(), startDate:'', endDate:'', cycleLength:profile.defaultCycleLength, periodLength:profile.defaultPeriodLength });

  useEffect(()=>{
    if(form.startDate && form.endDate && form.endDate>=form.startDate) {
      const pl = Math.max(1, diff(parse(form.startDate), parse(form.endDate))+1);
      setForm(f=>({...f, periodLength:pl}));
    }
  }, [form.startDate, form.endDate]);

  const valid = form.startDate && form.endDate && form.endDate>=form.startDate;
  return (
    <Sheet title={cycle?'✏️ Modifier les règles':'🩸 Ajouter des règles'} onClose={onClose}>
      <div style={{ padding:'20px 24px 32px', display:'flex', flexDirection:'column', gap:16 }}>
        <label>
          <span className="lbl">Début des règles</span>
          <input type="date" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))} className="field" />
        </label>
        <label>
          <span className="lbl">Fin des règles</span>
          <input type="date" value={form.endDate} min={form.startDate} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))} className="field" />
        </label>
        {form.startDate && form.endDate && <p style={{ fontSize:13, color:'#aaa', fontWeight:600 }}>Durée : {form.periodLength} jour{form.periodLength>1?'s':''}</p>}
        <label>
          <span className="lbl">Longueur de ce cycle (jours)</span>
          <input type="number" min={21} max={45} value={form.cycleLength} onChange={e=>setForm(f=>({...f,cycleLength:+e.target.value}))} className="field" />
        </label>
        <button className="btn-main" onClick={()=>{ if(valid) onSave(form); }} style={{ opacity:valid?1:0.4, cursor:valid?'pointer':'not-allowed' }}>Enregistrer</button>
      </div>
    </Sheet>
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
